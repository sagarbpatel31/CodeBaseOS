name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # No credentials in CI — the suite runs against the offline fixture.
    env:
      CBOS_OFFLINE_DEMO: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff) — advisory, non-blocking
        continue-on-error: true
        run: ruff check .

      - name: Test (credential-free)
        run: pytest -q
